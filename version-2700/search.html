<script>
(async function () {
  const data = await fetch('assets/movie-data.json').then(r => r.json());
  const results = document.getElementById('searchResults');
  const search = document.getElementById('globalSearch');
  const genre = document.getElementById('globalGenre');
  const year = document.getElementById('globalYear');
  const count = document.getElementById('searchCount');
  const tags = Array.from(document.querySelectorAll('[data-global-tag]'));

  function escHtml(s) {
    return String(s).replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;"}[c]));
  }
  function posterStyle(i){
    const grad = [
      ['#7c3aed', '#06b6d4'], ['#ef4444', '#f59e0b'], ['#10b981', '#14b8a6'], ['#f97316', '#ec4899']
    ][i % 4];
    return `background: linear-gradient(135deg, ${grad[0]}, ${grad[1]});`;
  }
  function render(list) {
    count.textContent = list.length;
    results.innerHTML = list.map((m, i) => `
      <a class="card" href="movie-${String(m.id).padStart(4,'0')}.html"
         data-search-card data-title="${escHtml(m.title)}" data-year-value="${m.year}" data-hot-score="${m.hot_score}"
         data-card-genres="${escHtml(m.genre)}" data-search-keywords="${escHtml([m.title,m.region,m.type,m.year,m.genre,m.tags,m.one_line,m.summary].join(' '))}">
        <div class="cover" style="${posterStyle(i)}"><div class="poster">${escHtml(m.poster_text)}</div></div>
        <div class="body">
          <h3>${escHtml(m.title)}</h3>
          <div class="mini">${escHtml(m.one_line)}</div>
          <div class="meta">
            <span class="badge">${escHtml(m.region)}</span>
            <span class="badge">${escHtml(m.year)}</span>
            <span class="badge">${escHtml(m.genre)}</span>
          </div>
        </div>
      </a>`).join('');
  }
  function apply() {
    const q = search.value.trim().toLowerCase();
    const g = genre.value.trim().toLowerCase();
    const y = year.value.trim();
    const filtered = data.filter(m => {
      const text = [m.title,m.region,m.type,m.year,m.genre,m.tags,m.one_line,m.summary,m.review].join(' ').toLowerCase();
      if (q && !text.includes(q)) return false;
      if (g && !m.genre.toLowerCase().includes(g) && !m.tags.toLowerCase().includes(g)) return false;
      if (y && String(m.year) !== y) return false;
      return true;
    }).sort((a,b)=>b.hot_score-a.hot_score).slice(0, 240);
    render(filtered);
  }
  search.addEventListener('input', apply);
  genre.addEventListener('change', apply);
  year.addEventListener('change', apply);
  tags.forEach(t => t.addEventListener('click', () => {
    tags.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    genre.value = t.getAttribute('data-global-tag');
    apply();
  }));
  apply();
})();
</script>
